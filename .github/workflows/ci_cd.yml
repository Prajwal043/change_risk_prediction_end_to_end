docker-build:

runs-on: ubuntu-latest

needs: train-model

steps:

```
- uses: actions/checkout@v4

- name: Login to Docker Hub
  uses: docker/login-action@v3
  with:
    username: ${{ secrets.DOCKER_USERNAME }}
    password: ${{ secrets.DOCKER_PASSWORD }}

- name: Build API Image
  run: |
    docker build -t change-risk-api ./api

- name: Tag API Image
  run: |
    docker tag change-risk-api ${{ secrets.DOCKER_USERNAME }}/change-risk-api:latest

- name: Push API Image
  run: |
    docker push ${{ secrets.DOCKER_USERNAME }}/change-risk-api:latest

- name: Build Frontend Image
  run: |
    docker build -t change-risk-frontend ./frontend

- name: Tag Frontend Image
  run: |
    docker tag change-risk-frontend ${{ secrets.DOCKER_USERNAME }}/change-risk-frontend:latest

- name: Push Frontend Image
  run: |
    docker push ${{ secrets.DOCKER_USERNAME }}/change-risk-frontend:latest
```
